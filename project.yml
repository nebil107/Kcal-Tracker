# XcodeGen-Spezifikation für KalorienPlaner.
# Aus dieser Datei erzeugt der macOS-Runner per `xcodegen generate` die .xcodeproj.
# Die .xcodeproj selbst wird NICHT eingecheckt (siehe .gitignore) – diese Datei ist die
# einzige Quelle der Projekt-Wahrheit und damit auf Windows leicht zu pflegen.

name: KalorienPlaner

options:
  bundleIdPrefix: de.nebil
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  # Einheitliches Standard-Verhalten ohne Code-Signing (SideStore signiert später selbst).
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Signing global deaktiviert – es werden keine Apple-Zertifikate benötigt.
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    DEVELOPMENT_TEAM: ""

targets:
  # ---------------------------------------------------------------------------
  # App-Target
  # ---------------------------------------------------------------------------
  KalorienPlaner:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KalorienPlaner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.nebil.kalorienplaner
        # Info.plist wird von Xcode aus diesen Keys generiert (keine fragile Extra-Datei).
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "KalorienPlaner"
        INFOPLIST_KEY_LSRequiresIPhoneOS: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # Nur iPhone (1). Hält die App schlicht und vermeidet iPad-Layout-Sonderfälle.
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: "AccentColor"

  # ---------------------------------------------------------------------------
  # Unit-Test-Target (hostet sich auf der App, läuft im Simulator)
  # ---------------------------------------------------------------------------
  KalorienPlanerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KalorienPlanerTests
    dependencies:
      - target: KalorienPlaner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.nebil.kalorienplaner.tests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  KalorienPlaner:
    build:
      targets:
        KalorienPlaner: all
        KalorienPlanerTests: [test]
    test:
      targets:
        - KalorienPlanerTests
      gatherCoverageData: false
