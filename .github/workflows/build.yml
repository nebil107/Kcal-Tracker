name: Build KalorienPlaner (unsignierte IPA)

# Läuft automatisch bei jedem Push und kann zusätzlich manuell über den
# Actions-Tab gestartet werden ("Run workflow").
on:
  push:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Unit-Tests der Planungs-Logik (zeigt rot/grün, blockiert den Build NICHT).
  # ---------------------------------------------------------------------------
  test:
    name: Unit-Tests (Planungs-Logik)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Xcode auswählen (neueste stabile Version mit iOS-17-SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: XcodeGen installieren
        run: brew install xcodegen

      - name: Xcode-Projekt aus project.yml erzeugen
        run: xcodegen generate

      # Ermittelt eine real existierende iPhone-Simulator-UDID, damit der Test-Lauf
      # unabhängig von der konkreten Xcode-/Simulator-Version funktioniert.
      - name: Verfügbaren iOS-Simulator wählen
        run: |
          SIMULATOR_ID=$(xcrun simctl list devices available -j | python3 -c "import sys, json; d = json.load(sys.stdin)['devices']; ids = [dev['udid'] for rt in d for dev in d[rt] if 'iPhone' in dev.get('name','')]; print(ids[0] if ids else '')")
          if [ -z "$SIMULATOR_ID" ]; then echo "Kein iPhone-Simulator gefunden"; exit 1; fi
          echo "Verwende Simulator: $SIMULATOR_ID"
          echo "SIMULATOR_ID=$SIMULATOR_ID" >> "$GITHUB_ENV"

      - name: Unit-Tests ausführen
        run: |
          xcodebuild test \
            -project KalorienPlaner.xcodeproj \
            -scheme KalorienPlaner \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

  # ---------------------------------------------------------------------------
  # Job 2: Unsignierte IPA bauen + als Artifact bereitstellen.
  # Läuft unabhängig vom Test-Job, damit es auch bei einem fehlgeschlagenen
  # Logik-Test immer eine herunterladbare .ipa gibt.
  # ---------------------------------------------------------------------------
  build:
    name: Unsignierte IPA bauen
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Xcode auswählen (neueste stabile Version mit iOS-17-SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: XcodeGen installieren
        run: brew install xcodegen

      - name: Xcode-Projekt aus project.yml erzeugen
        run: xcodegen generate

      - name: App unsigniert für Gerät bauen
        run: |
          xcodebuild \
            -project KalorienPlaner.xcodeproj \
            -scheme KalorienPlaner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build

      # Verpackt die unsignierte .app nach dem klassischen Payload/-Schema in eine .ipa.
      # SideStore signiert diese .ipa später selbst auf dem iPhone.
      - name: Unsignierte IPA verpacken
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/KalorienPlaner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App nicht gefunden unter $APP_PATH"; exit 1
          fi
          rm -rf Payload KalorienPlaner.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr KalorienPlaner.ipa Payload
          echo "Fertige IPA:"; ls -lh KalorienPlaner.ipa

      - name: IPA als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: KalorienPlaner-unsigned-ipa
          path: KalorienPlaner.ipa
          if-no-files-found: error
          retention-days: 30
